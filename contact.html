<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>30 Minute Dine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="shortcut icon" href="Icons/icon.png" type="image/x-icon">
</head>
<body>
    <nav><img class="nav-icon" src="Icons/icon-and-text.png" onclick="location.href='index.html'"><div class="nav"><button class="navbutton" onclick="location.href='index.html'">home</button>  <button class="navbutton" onclick="location.href='pricing.html'">pricing</button>  <button class="navbutton" onclick="location.href='about-me.html'">about me</button>  <button class="navbutton" onclick="location.href='contact.html'">contact</button></div></nav>
    <header>
        <h1>Contact</h1>
        <hr class="header_accent" align="center">
    </header> 

    <section class="contact-section">
        <div style="text-align: center; color: white; padding: 3rem; font-family: 'Inter', sans-serif;">
            <h2>Get in touch</h2>
            <p>Ready to reclaim your evening? Reach out to us and let's get cooking.</p>
        </div>
            <form class="contact-container">
                <div>
                    <label id="namet" for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="message">Message:</label>
                </div>

                <div>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit">Send</button>
            </form>

            <div class="contact-container">

                    <h2 style="margin-bottom: -1rem;">Or</h2>

                <h2 style="margin-bottom: -1rem;">Reach out to us by email:</h2>
                <a href="mailto:30minutedine@gmail.com">30minutedine@gmail.com</a>
            </div>
    </section>

    <footer>
        
        <div class="socials">
            <a href="https://www.facebook.com/30MinuteDine" target="_blank"><img src="Icons/PNGs/regular/facebook-logo.png" class="social-icon"></a>
            <a href="https://www.twitter.com/30MinuteDine" target="_blank"><img src="Icons/PNGs/regular/x-logo.png" class="social-icon"></a>
            <a href="https://www.instagram.com/30MinuteDine" target="_blank"><img src="Icons/PNGs/regular/instagram-logo.png" class="social-icon"></a>
            <a href="https://www.youtube.com/30MinuteDine" target="_blank"><img src="Icons/PNGs/regular/youtube-logo.png" class="social-icon"></a>
        </div>
        <a id="email-footer" href="mailto:30minutedine@gmail.com">30minutedine@gmail.com</a>
        <p>&copy; 2026 The 30 Minute Dine&trade;. All rights reserved.</p>
    </footer>
</body>
</html>
